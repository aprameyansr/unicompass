<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professor Finder</title>

<link rel="icon" type="image/png" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#081225;
    color:white;
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1500px;
    margin:auto;
}

.title{
    text-align:center;
    margin-bottom:40px;
}

.title h1{
    font-size:58px;
    color:#4f66ff;
    margin-bottom:10px;
}

.title p{
    color:#aab4d6;
    font-size:20px;
}

.filters{
    background:#1b2435;
    border-radius:26px;
    padding:25px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:35px;
    box-shadow:0 0 25px rgba(0,0,0,0.35);
}

.search-box{
    flex:1;
    min-width:280px;
}

input,
select{
    width:100%;
    background:#2d374d;
    border:none;
    outline:none;
    border-radius:16px;
    padding:16px;
    color:white;
    font-size:16px;
}

input::placeholder{
    color:#aeb7d0;
}

.professor-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(350px,1fr));
    gap:25px;
}

.card{
    background:#1b2435;
    border-radius:28px;
    padding:28px;
    box-shadow:0 0 25px rgba(0,0,0,0.35);
    transition:0.25s;
}

.card:hover{
    transform:translateY(-5px);
}

.top{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:25px;
}

.profile-image{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #4f66ff;
    background:#101827;
    pointer-events:none;
    user-select:none;
}

.name{
    font-size:28px;
    font-weight:600;
    line-height:1.3;
}

.role{
    margin-top:10px;
    display:inline-block;
    background:#101827;
    color:#89a0ff;
    padding:8px 14px;
    border-radius:12px;
    font-size:14px;
    font-weight:500;
}

.info{
    margin-top:10px;
}

.info-item{
    margin-bottom:18px;
}

.label{
    color:#7f8aa8;
    font-size:14px;
    margin-bottom:5px;
}

.value{
    font-size:17px;
    color:#e8ecff;
    line-height:1.5;
}

.email-row{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.copy-btn{
    background:#4f66ff;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    transition:0.2s;
}

.copy-btn:hover{
    background:#667cff;
}

.empty{
    text-align:center;
    color:#aab4d6;
    margin-top:60px;
    font-size:22px;
}

@media(max-width:768px){

    body{
        padding:20px;
    }

    .title h1{
        font-size:42px;
    }

    .filters{
        flex-direction:column;
    }

    .top{
        flex-direction:column;
        text-align:center;
    }

    .email-row{
        flex-direction:column;
        align-items:flex-start;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="title">

        <h1>
            Professor Finder
        </h1>

        <p>
            Search faculty members by name or school
        </p>

    </div>

    <div class="filters">

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Search professor name..."
            >

        </div>

        <div class="search-box">

            <select id="schoolFilter">

                <option value="all">
                    All Schools
                </option>

            </select>

        </div>

    </div>

    <div
        class="professor-grid"
        id="professorGrid"
    ></div>

    <div
        class="empty"
        id="emptyMessage"
        style="display:none;"
    >
        No professors found
    </div>

</div>

<script>

document.addEventListener(
    "contextmenu",
    event => event.preventDefault()
);

let professors = [];

async function loadProfessors()
{
    try
    {
        const response =
            await fetch("professors.json");

        professors =
            await response.json();

        populateSchools();

        renderProfessors(professors);
    }

    catch(error)
    {
        console.error(
            "Error loading professors:",
            error
        );
    }
}

function populateSchools()
{
    const schoolFilter =
        document.getElementById(
            "schoolFilter"
        );

    const schools =
        [...new Set(
            professors.map(
                professor =>
                professor.school
            )
        )];

    schools.forEach(school =>
    {
        const option =
            document.createElement("option");

        option.value = school;

        option.textContent = school;

        schoolFilter.appendChild(option);
    });
}

function renderProfessors(data)
{
    const grid =
        document.getElementById(
            "professorGrid"
        );

    const emptyMessage =
        document.getElementById(
            "emptyMessage"
        );

    grid.innerHTML = "";

    if(data.length === 0)
    {
        emptyMessage.style.display =
            "block";

        return;
    }

    emptyMessage.style.display =
        "none";

    data.forEach(professor =>
    {
        const card =
            document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <div class="top">

                <img
                    src="${professor.photo}"
                    class="profile-image"
                    draggable="false"
                >

                <div>

                    <div class="name">
                        ${professor.name}
                    </div>

                    <div class="role">
                        ${professor.role}
                    </div>

                </div>

            </div>

            <div class="info">

                <div class="info-item">

                    <div class="label">
                        Room
                    </div>

                    <div class="value">
                        ${professor.room}
                    </div>

                </div>

                <div class="info-item">

                    <div class="label">
                        School
                    </div>

                    <div class="value">
                        ${professor.school}
                    </div>

                </div>

                <div class="info-item">

                    <div class="label">
                        Department
                    </div>

                    <div class="value">
                        ${professor.department}
                    </div>

                </div>

                <div class="info-item">

                    <div class="label">
                        Email
                    </div>

                    <div class="email-row">

                        <div class="value">
                            ${professor.email}
                        </div>

                        <button
                            class="copy-btn"
                            onclick="copyEmail('${professor.email}')"
                        >
                            Copy
                        </button>

                    </div>

                </div>

            </div>

        `;

        grid.appendChild(card);
    });
}

function copyEmail(email)
{
    navigator.clipboard.writeText(email);

    alert(
        "Email copied to clipboard"
    );
}

function filterProfessors()
{
    const searchValue =
        document
        .getElementById("searchInput")
        .value
        .toLowerCase();

    const schoolValue =
        document
        .getElementById("schoolFilter")
        .value;

    const filtered =
        professors.filter(professor =>
    {
        const matchesSearch =
            professor.name
            .toLowerCase()
            .includes(searchValue);

        const matchesSchool =
            schoolValue === "all"
            ||
            professor.school === schoolValue;

        return (
            matchesSearch &&
            matchesSchool
        );
    });

    renderProfessors(filtered);
}

document
    .getElementById("searchInput")
    .addEventListener(
        "input",
        filterProfessors
    );

document
    .getElementById("schoolFilter")
    .addEventListener(
        "change",
        filterProfessors
    );

loadProfessors();

</script>

</body>
</html>
